title: "Copilot Team Workflow"
description: "A 9-part guide for software teams to use GitHub Copilot with structure, consistency, and discipline. Covers agents, instructions, the 5-phase workflow, API architecture, and team setup."
remote_theme: pages-themes/cayman

url: "https://srisatyalokesh.github.io"
baseurl: "/copilot-best-practices-for-teams"

# Exclude boilerplate and technical docs from the site build
exclude:
  - docs/
  - LICENSE
  - README.md
  - .github/
  - .vscode/
  - vendor/
  - Gemfile
  - Gemfile.lock
  - node_modules/

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

# Exclude boilerplate and technical docs from the site build
exclude:
  - docs/
  - LICENSE
  - README.md
  - .github/
  - .vscode/
  - vendor/
  - Gemfile
  - Gemfile.lock
  - node_modules/
